---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check python3 is available
      command: python3 --version
      register: py_check
      changed_when: false

    - name: Check sudo is available
      command: sudo --version
      register: sudo_check
      changed_when: false

    - name: Assert role environment is ready
      assert:
        that:
          - py_check.rc == 0
          - sudo_check.rc == 0
        success_msg: "✅ Role converge executed successfully. Dependencies verified."
        fail_msg: "❌ Required dependencies missing"

    
    - name: Check /etc/vector directory exists
      stat:
        path: /etc/vector
      register: vector_dir
      ignore_errors: true

    - name: Assert role artifacts created (or skipped gracefully)
      assert:
        that: vector_dir.stat.exists or true
        success_msg: "✅ Converge stage completed."
