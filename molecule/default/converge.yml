---
- name: Converge (lightweight)
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    
    - name: Install python3 and sudo
      ansible.builtin.raw: /bin/bash -c "apt-get update -qq && apt-get install -y -qq python3 sudo"
      become: false  
      changed_when: false
      tags: [always]

    
    - name: Gather facts
      ansible.builtin.setup:

  roles:
    - role: ../../  # Относительный путь к корню роли

  post_tasks:
    - name: Quick validation
      command: echo "Role applied successfully"
      changed_when: false
